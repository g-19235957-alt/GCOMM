<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Catalogue</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['DM Sans','sans-serif'], display: ['Playfair Display','serif'] } } } }</script>
  <style>
    html, body { margin:0; }
    body { font-family:'DM Sans',sans-serif; background:#f6f5f2; }
    .display { font-family:'Playfair Display',serif; }
    .toast-enter { animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { transform: translateY(-100%); opacity:0; } to { transform: translateY(0); opacity:1; } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes popIn { from { opacity:0; transform: scale(0.96) translateY(8px); } to { opacity:1; transform: scale(1) translateY(0); } }
    .modal-fade { animation: fadeIn 0.2s ease; }
    .modal-pop { animation: popIn 0.25s cubic-bezier(0.16,1,0.3,1); }
    .line-clamp-2 { display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
    .card-hover { transition: transform 0.3s cubic-bezier(0.16,1,0.3,1), box-shadow 0.3s ease; }
    .card-hover:hover { transform: translateY(-4px); box-shadow: 0 16px 40px -12px rgba(0,0,0,0.18); }
    .img-zoom { transition: transform 0.5s cubic-bezier(0.16,1,0.3,1); }
    .card-hover:hover .img-zoom { transform: scale(1.06); }
    .accent-line { background: linear-gradient(90deg,#b8945f,#d4af7a); }
    @keyframes shimmer { 0% { background-position:-450px 0; } 100% { background-position:450px 0; } }
    .skeleton { background:#e9e9ec; background-image:linear-gradient(90deg,#e9e9ec 0px,#f4f4f6 60px,#e9e9ec 120px); background-size:600px; animation: shimmer 1.4s infinite linear; }
  </style>
 </head>
 <body class="min-h-full" style="background:#f6f5f2;">

  <!-- HEADER -->
  <header class="text-white sticky top-0 z-[100] shadow-lg" style="background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);">
    <div class="max-w-7xl mx-auto px-4 py-8 flex items-center justify-between gap-4">
      <div class="flex items-center gap-4 min-w-0">
        <img id="catLogo" class="hidden h-12 w-12 object-contain rounded-lg bg-white p-1.5" alt="">
        <div class="min-w-0">
          <h1 id="catTitle" class="display text-3xl font-bold truncate tracking-tight">Product Catalogue</h1>
          <div class="flex items-center gap-2 mt-1.5">
            <span class="h-0.5 w-8 accent-line rounded-full"></span>
            <p class="text-slate-300 text-xs uppercase tracking-widest">Browse &amp; request an order</p>
          </div>
        </div>
      </div>
      <button onclick="openCart()" class="relative text-white rounded-lg px-5 py-2.5 font-semibold flex items-center gap-2 flex-shrink-0 transition" style="background:linear-gradient(135deg,#b8945f,#d4af7a);">
        <i data-lucide="shopping-bag" class="w-4 h-4"></i><span class="hidden sm:inline">Order</span>
        <span id="cartCount" class="hidden absolute -top-2 -right-2 bg-rose-600 text-white text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center">0</span>
      </button>
    </div>
  </header>

  <!-- MAIN -->
  <main class="max-w-7xl mx-auto px-4 py-8">
    <!-- HERO -->
    <div id="heroBanner" class="hidden rounded-2xl overflow-hidden mb-8 relative" style="background:linear-gradient(135deg,#1a1a2e 0%,#16213e 60%,#1f2a4a 100%);">
      <div class="absolute top-0 right-0 w-48 h-48 rounded-full" style="background:radial-gradient(circle,rgba(184,148,95,0.22),transparent 70%);"></div>
      <div class="relative px-6 sm:px-8 py-7 text-white">
        <div class="flex items-center gap-4">
          <img id="heroLogo" class="hidden h-14 w-14 sm:h-16 sm:w-16 object-contain rounded-xl bg-white p-2 flex-shrink-0" alt="">
          <div class="min-w-0">
            <h2 id="heroTitle" class="display text-2xl sm:text-3xl font-bold leading-tight"></h2>
            <p id="heroTagline" class="text-slate-300 mt-1 text-xs sm:text-sm leading-relaxed"></p>
          </div>
        </div>
        <p id="heroThanks" class="text-[#d4af7a] mt-3 text-xs sm:text-sm italic"></p>
        <button onclick="document.getElementById('shopStart').scrollIntoView({behavior:'smooth'})" class="mt-4 bg-white text-slate-900 hover:bg-slate-100 rounded-full px-5 py-2 font-semibold text-xs sm:text-sm transition inline-flex items-center gap-2">Browse Products <i data-lucide="arrow-down" class="w-4 h-4"></i></button>
      </div>
    </div>

    <!-- HOW IT WORKS -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-3 mb-10">
      <div class="bg-white rounded-xl border border-slate-100 p-4 text-center" style="box-shadow:0 4px 14px -8px rgba(0,0,0,0.08);"><div class="w-10 h-10 rounded-full mx-auto mb-2 flex items-center justify-center" style="background:#f3ede1;"><i data-lucide="search" class="w-5 h-5" style="color:#b8945f;"></i></div><p class="text-xs font-bold text-slate-800">1. Browse</p><p class="text-[11px] text-slate-500 mt-0.5">Explore our products</p></div>
      <div class="bg-white rounded-xl border border-slate-100 p-4 text-center" style="box-shadow:0 4px 14px -8px rgba(0,0,0,0.08);"><div class="w-10 h-10 rounded-full mx-auto mb-2 flex items-center justify-center" style="background:#f3ede1;"><i data-lucide="shopping-bag" class="w-5 h-5" style="color:#b8945f;"></i></div><p class="text-xs font-bold text-slate-800">2. Order</p><p class="text-[11px] text-slate-500 mt-0.5">Submit your request</p></div>
      <div class="bg-white rounded-xl border border-slate-100 p-4 text-center" style="box-shadow:0 4px 14px -8px rgba(0,0,0,0.08);"><div class="w-10 h-10 rounded-full mx-auto mb-2 flex items-center justify-center" style="background:#f3ede1;"><i data-lucide="phone-call" class="w-5 h-5" style="color:#b8945f;"></i></div><p class="text-xs font-bold text-slate-800">3. We Confirm</p><p class="text-[11px] text-slate-500 mt-0.5">We call to confirm</p></div>
      <div class="bg-white rounded-xl border border-slate-100 p-4 text-center" style="box-shadow:0 4px 14px -8px rgba(0,0,0,0.08);"><div class="w-10 h-10 rounded-full mx-auto mb-2 flex items-center justify-center" style="background:#f3ede1;"><i data-lucide="truck" class="w-5 h-5" style="color:#b8945f;"></i></div><p class="text-xs font-bold text-slate-800">4. Deliver/Collect</p><p class="text-[11px] text-slate-500 mt-0.5">Get your items</p></div>
    </div>

    <div id="shopStart"></div>
    <div id="catalogueArea"></div>
  </main>

  <!-- COMPANY FOOTER -->
  <footer id="catFooter" class="hidden text-white mt-12" style="background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);">
    <div class="max-w-7xl mx-auto px-4 py-10">
      <div class="flex items-center gap-2 mb-6"><span class="h-0.5 w-10 accent-line rounded-full"></span><span class="text-xs uppercase tracking-widest text-slate-300">Get in touch</span></div>
      <div id="footerContent" class="grid grid-cols-1 sm:grid-cols-2 gap-8"></div>
      <div class="border-t border-white/10 mt-8 pt-6 text-center text-xs text-slate-400"><span id="footerCopyright"></span></div>
    </div>
  </footer>

  <!-- CART DRAWER -->
  <div id="cartDrawer" class="hidden fixed inset-0 z-[120]">
    <div class="absolute inset-0 bg-black/50" onclick="closeCart()"></div>
    <div class="absolute right-0 top-0 bottom-0 w-full max-w-md bg-white flex flex-col shadow-xl">
      <div class="p-5 border-b flex items-center justify-between">
        <h2 class="font-bold text-lg text-slate-800">Your Order</h2>
        <button onclick="closeCart()" class="text-slate-400 hover:text-slate-600"><i data-lucide="x" class="w-5 h-5"></i></button>
      </div>
      <div id="cartItemsArea" class="flex-1 overflow-y-auto p-5"></div>
      <div id="cartFooter" class="border-t p-5"></div>
    </div>
  </div>

  <!-- PRODUCT DETAIL MODAL -->
  <div id="productModal" class="hidden fixed inset-0 z-[140] flex items-center justify-center p-4">
    <div class="absolute inset-0 modal-fade" style="background:rgba(20,20,35,0.65);backdrop-filter:blur(3px);" onclick="closeProductModal()"></div>
    <div id="productModalInner" class="relative modal-pop bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden max-h-[90vh] flex flex-col"></div>
  </div>

  <!-- FLOATING WHATSAPP -->
  <a id="whatsappBtn" href="#" target="_blank" rel="noopener" class="hidden fixed bottom-5 right-5 z-[110] flex items-center gap-2 text-white rounded-full pl-4 pr-5 py-3 font-semibold shadow-lg transition hover:scale-105" style="background:#25D366;">
    <i data-lucide="message-circle" class="w-5 h-5"></i><span class="hidden sm:inline">Chat with us</span>
  </a>

  <div id="toastContainer" class="fixed top-4 right-4 z-[300] flex flex-col gap-2"></div>

  <script>
  const SHEETS_URL_KEY = 'catalogue_sheets_url';
  const SHEET_URL = 'https://script.google.com/macros/s/AKfycbyX8KxQ4oUCygvWZ9RkwIQRQjw33aygrlQzMLj8uTeGpdpEzFCpuO_XAebAuuVT99Lf/exec';
  let products = [], companyInfo = null, cart = [], activeCategory = 'all';
  let catSearch = '', catSort = 'name';
  const CART_KEY = 'catalogue_cart_v1';
  try { const saved = localStorage.getItem(CART_KEY); if (saved) cart = JSON.parse(saved) || []; } catch(e){ cart = []; }
  function saveCart(){ try { localStorage.setItem(CART_KEY, JSON.stringify(cart)); } catch(e){} }

  function showToast(msg, type='success'){
    const t = document.createElement('div');
    t.className = `toast-enter px-4 py-3 rounded-lg shadow-lg text-sm font-medium ${type==='error'?'bg-red-600 text-white':'bg-emerald-600 text-white'}`;
    t.textContent = msg; document.getElementById('toastContainer').appendChild(t);
    setTimeout(()=>t.remove(), 3000);
  }
  function formatCurrency(n){ return new Intl.NumberFormat('ms-MY',{style:'currency',currency:'MYR'}).format(n||0); }
  function escapeHtml(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function renderMarkup(text){
    if (!text) return '';
    const escaped = escapeHtml(text);
    const lines = escaped.split('\n');
    let html = '', inList = false;
    const inline = s => s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>').replace(/\*([^*]+)\*/g,'<em>$1</em>');
    for (let raw of lines){
      const line = raw.trim();
      if (/^[-*]\s+/.test(line)){
        if (!inList){ html += '<ul style="list-style:disc;margin:4px 0;padding-left:18px;">'; inList = true; }
        html += '<li>' + inline(line.replace(/^[-*]\s+/,'')) + '</li>';
      } else {
        if (inList){ html += '</ul>'; inList = false; }
        if (line === '') html += '<div style="height:5px;"></div>';
        else html += '<p style="margin:2px 0;">' + inline(line) + '</p>';
      }
    }
    if (inList) html += '</ul>';
    return html;
  }
  function plainSnippet(text, n){ const t = (text||'').replace(/[*\-]/g,'').replace(/\s+/g,' ').trim(); return t.length > n ? t.slice(0,n)+'…' : t; }

  async function loadData(){
    try {
      const res = await fetch(SHEET_URL, { method:'GET' });
      const json = await res.json();
      if (!json.ok) throw new Error('bad response');
      const data = json.data || [];
      products = data.filter(d => d.type === 'product');
      companyInfo = data.find(d => d.type === 'company') || null;
      applyBranding();
      renderCatalogue();
      return true;
    } catch(e){ console.error(e); return false; }
  }

  function applyBranding(){
    const name = companyInfo?.company_name || 'Product Catalogue';
    document.getElementById('catTitle').textContent = name;
    document.title = name;
    const logo = companyInfo?.company_logo;
    const img = document.getElementById('catLogo');
    if (logo){ img.src = logo; img.classList.remove('hidden'); img.onerror = ()=>img.classList.add('hidden'); }

    // Hero banner
    document.getElementById('heroTitle').textContent = name;
    document.getElementById('heroTagline').textContent = 'Your trusted partner for quality products and dependable service.';
    document.getElementById('heroThanks').textContent = '“Thank you for choosing us — every order you place means the world to our team.”';
    if (logo){ const hl = document.getElementById('heroLogo'); hl.src = logo; hl.classList.remove('hidden'); hl.onerror = ()=>hl.classList.add('hidden'); }
    document.getElementById('heroBanner').classList.remove('hidden');

    // Floating WhatsApp from company phone
    const phone = companyInfo?.company_phone || '';
    let digits = phone.replace(/\D/g,'');
    if (digits){
      if (digits.startsWith('0')) digits = '60' + digits.slice(1); // Malaysian local -> intl
      const msg = encodeURIComponent(`Hi ${name}, I'd like to ask about your products.`);
      const wa = document.getElementById('whatsappBtn');
      wa.href = `https://wa.me/${digits}?text=${msg}`;
      wa.classList.remove('hidden');
    }
    // Footer with company info & contacts
    const c = companyInfo;
    if (c && (c.company_name || c.company_address || c.company_phone || c.company_email)){
      const left = `
        <div>
          ${c.company_logo ? `<img src="${c.company_logo}" class="h-12 mb-3 object-contain" onerror="this.style.display='none'">` : ''}
          <h3 class="display text-xl font-bold mb-2">${c.company_name || ''}</h3>
          ${c.company_address ? `<p class="text-sm text-slate-300 leading-relaxed whitespace-pre-line">${c.company_address}</p>` : ''}
          ${c.company_reg ? `<p class="text-xs text-slate-400 mt-2">Reg: ${c.company_reg}</p>` : ''}
        </div>`;
      const contacts = [];
      if (c.company_phone) contacts.push(`<a href="tel:${c.company_phone.replace(/\s/g,'')}" class="flex items-center gap-3 text-slate-200 hover:text-white transition"><span class="w-9 h-9 rounded-full bg-white/10 flex items-center justify-center flex-shrink-0"><i data-lucide="phone" class="w-4 h-4"></i></span><span class="text-sm">${c.company_phone}</span></a>`);
      if (c.company_email) contacts.push(`<a href="mailto:${c.company_email}" class="flex items-center gap-3 text-slate-200 hover:text-white transition"><span class="w-9 h-9 rounded-full bg-white/10 flex items-center justify-center flex-shrink-0"><i data-lucide="mail" class="w-4 h-4"></i></span><span class="text-sm">${c.company_email}</span></a>`);
      if (c.company_address) contacts.push(`<div class="flex items-start gap-3 text-slate-200"><span class="w-9 h-9 rounded-full bg-white/10 flex items-center justify-center flex-shrink-0"><i data-lucide="map-pin" class="w-4 h-4"></i></span><span class="text-sm leading-relaxed whitespace-pre-line">${c.company_address}</span></div>`);
      const right = `<div><p class="text-xs uppercase tracking-wider text-slate-400 mb-3 font-semibold">Contact Us</p><div class="space-y-3">${contacts.join('')}</div></div>`;
      document.getElementById('footerContent').innerHTML = left + right;
      document.getElementById('footerCopyright').textContent = `© ${new Date().getFullYear()} ${c.company_name || ''}. All rights reserved.`;
      document.getElementById('catFooter').classList.remove('hidden');
      lucide.createIcons();
    }
  }

  function renderCatalogue(){
    const area = document.getElementById('catalogueArea');
    if (products.length === 0){ area.innerHTML = '<div class="text-center py-20 text-slate-400">No products available right now.</div>'; return; }
    const categories = [...new Set(products.map(p => p.category || 'Uncategorized'))];
    let visible = activeCategory === 'all' ? [...products] : products.filter(p => (p.category||'Uncategorized') === activeCategory);
    if (catSearch){ const q = catSearch.toLowerCase(); visible = visible.filter(p => p.name.toLowerCase().includes(q) || (p.category||'').toLowerCase().includes(q) || (p.description||'').toLowerCase().includes(q)); }
    visible.sort((a,b) => {
      if (catSort === 'price_low') return (a.price||0) - (b.price||0);
      if (catSort === 'price_high') return (b.price||0) - (a.price||0);
      return a.name.localeCompare(b.name);
    });
    const available = visible.filter(p => (p.quantity||0) > 0);
    const soldOut = visible.filter(p => (p.quantity||0) <= 0);
    const gridOpen = '<div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">';
    let body;
    if (visible.length === 0){
      body = '<div class="text-center py-16 text-slate-400">No products match your search.</div>';
    } else {
      body = '';
      if (available.length) body += gridOpen + available.map(renderProductCard).join('') + '</div>';
      else body += '<div class="text-center py-10 text-slate-400">No items currently in stock.</div>';
      if (soldOut.length){
        body += `<div class="mt-12 pt-8 border-t border-slate-200">
          <div class="flex items-center gap-2 mb-5"><span class="h-0.5 w-8 rounded-full bg-rose-300"></span><h3 class="display text-lg font-bold text-slate-700">Currently Sold Out</h3><span class="text-xs text-slate-400">— backorder still welcome</span></div>
          ${gridOpen}${soldOut.map(renderProductCard).join('')}</div></div>`;
      }
    }
    area.innerHTML = `
      <div class="flex flex-col sm:flex-row gap-3 mb-6">
        <div class="flex-1 relative">
          <i data-lucide="search" class="w-4 h-4 absolute left-3.5 top-3.5 text-slate-400"></i>
          <input type="search" value="${catSearch.replace(/"/g,'&quot;')}" oninput="updateCatSearch(this.value)" placeholder="Search products..." class="w-full bg-white border border-slate-200 rounded-xl pl-10 pr-4 py-3 text-sm focus:ring-2 focus:ring-[#b8945f] focus:border-[#b8945f] outline-none">
        </div>
        <select onchange="updateCatSort(this.value)" class="bg-white border border-slate-200 rounded-xl px-4 py-3 text-sm focus:ring-2 focus:ring-[#b8945f] outline-none">
          <option value="name" ${catSort==='name'?'selected':''}>Sort: Name (A–Z)</option>
          <option value="price_low" ${catSort==='price_low'?'selected':''}>Sort: Price (Low–High)</option>
          <option value="price_high" ${catSort==='price_high'?'selected':''}>Sort: Price (High–Low)</option>
        </select>
      </div>
      <div class="mb-8 flex flex-wrap gap-2.5">
        <button onclick="setCategory('all')" class="px-5 py-2 rounded-full font-semibold text-sm transition ${activeCategory==='all'?'text-white shadow-md':'bg-white border border-slate-200 text-slate-600 hover:border-slate-300'}" ${activeCategory==='all'?'style="background:linear-gradient(135deg,#1a1a2e,#16213e);"':''}>All Products <span class="opacity-60">(${products.length})</span></button>
        ${categories.map(c => { const cnt = products.filter(p => (p.category||'Uncategorized')===c).length; return `<button onclick="setCategory('${c.replace(/'/g,"\\'")}')" class="px-5 py-2 rounded-full font-semibold text-sm transition ${activeCategory===c?'text-white shadow-md':'bg-white border border-slate-200 text-slate-600 hover:border-slate-300'}" ${activeCategory===c?'style="background:linear-gradient(135deg,#1a1a2e,#16213e);"':''}>${c} <span class="opacity-60">(${cnt})</span></button>`; }).join('')}
      </div>
      <p class="text-sm text-slate-500 mb-5">Showing <span class="font-semibold text-slate-700">${visible.length}</span> ${visible.length === 1 ? 'product' : 'products'}${catSearch?` for “${catSearch}”`:''}</p>
      ${body}`;
    lucide.createIcons();
  }
  function updateCatSearch(v){ catSearch = v; renderCatalogue(); }
  function updateCatSort(v){ catSort = v; renderCatalogue(); }

  function renderProductCard(p){
    const soldOut = (p.quantity || 0) <= 0;
    return `<div class="card-hover bg-white rounded-2xl overflow-hidden flex flex-col" style="box-shadow:0 4px 20px -8px rgba(0,0,0,0.1);">
      <div class="relative h-40 bg-gradient-to-br from-slate-100 to-slate-200 flex items-center justify-center overflow-hidden cursor-pointer group" onclick="openProductModal('${p.__backendId}')">
        ${p.product_photo ? `<img src="${p.product_photo}" alt="${p.name}" class="img-zoom w-full h-full object-cover" onerror="this.style.display='none'">` : `<i data-lucide="package" class="w-14 h-14 text-slate-300"></i>`}
        ${soldOut ? `<div class="absolute top-3 left-3"><span class="bg-rose-600 text-white px-3 py-1 rounded-full font-semibold text-xs tracking-wide shadow">SOLD OUT</span></div>` : ''}
        <div class="absolute bottom-3 right-3 bg-white/90 backdrop-blur rounded-full w-9 h-9 flex items-center justify-center opacity-0 group-hover:opacity-100 transition shadow-md"><i data-lucide="maximize-2" class="w-4 h-4 text-slate-700"></i></div>
      </div>
      <div class="p-4 flex-1 flex flex-col">
        ${p.category ? `<span class="text-[10px] font-bold text-[#b8945f] uppercase tracking-[0.12em] mb-1">${p.category}</span>` : ''}
        <h3 class="display text-base font-bold text-slate-900 leading-snug cursor-pointer hover:text-[#b8945f] transition" onclick="openProductModal('${p.__backendId}')">${p.name}</h3>
        ${p.description ? `<p class="text-xs text-slate-500 mt-1 line-clamp-2 leading-relaxed">${plainSnippet(p.description, 90)}</p>` : ''}
        <div class="mt-auto pt-3">
          <div class="flex items-end justify-between mb-2.5">
            <span class="text-lg font-bold text-slate-900">${formatCurrency(p.price)}</span>
            <span class="text-[11px] ${soldOut?'text-rose-500 font-semibold':'text-slate-400'}">${soldOut?'Backorder':p.quantity+' left'}</span>
          </div>
          <button onclick="addToCart('${p.__backendId}')" class="w-full text-white hover:opacity-90 rounded-lg py-2 text-xs font-semibold transition flex items-center justify-center gap-1.5" style="background:linear-gradient(135deg,${soldOut?'#9a7b4f,#b8945f':'#1a1a2e,#16213e'});"><i data-lucide="${soldOut?'clock':'plus'}" class="w-3.5 h-3.5"></i>${soldOut?'Backorder':'Add to Order'}</button>
        </div>
      </div>
    </div>`;
  }

  function openProductModal(id){
    const p = products.find(x => x.__backendId === id); if (!p) return;
    const soldOut = (p.quantity || 0) <= 0;
    const inner = document.getElementById('productModalInner');
    inner.innerHTML = `
      <button onclick="closeProductModal()" class="absolute top-3 right-3 z-10 bg-white/90 backdrop-blur hover:bg-white rounded-full w-9 h-9 flex items-center justify-center shadow-md transition"><i data-lucide="x" class="w-5 h-5 text-slate-700"></i></button>
      <div class="overflow-y-auto flex-1">
        <div class="h-64 sm:h-72 bg-gradient-to-br from-slate-100 to-slate-200 flex items-center justify-center overflow-hidden">
          ${p.product_photo ? `<img src="${p.product_photo}" alt="${p.name}" class="w-full h-full object-contain" onerror="this.parentElement.innerHTML='<i data-lucide=\\'package\\' class=\\'w-20 h-20 text-slate-300\\'></i>';lucide.createIcons();">` : `<i data-lucide="package" class="w-20 h-20 text-slate-300"></i>`}
        </div>
        <div class="p-6">
          ${p.category ? `<span class="text-[10px] font-bold text-[#b8945f] uppercase tracking-[0.15em]">${p.category}</span>` : ''}
          <h2 class="display text-2xl font-bold text-slate-900 mt-1">${p.name}</h2>
          <div class="flex items-center gap-3 mt-2 mb-4">
            <span class="text-2xl font-bold text-slate-900">${formatCurrency(p.price)}</span>
            <span class="px-2.5 py-1 rounded-full text-xs font-semibold ${soldOut?'bg-rose-100 text-rose-700':'bg-emerald-100 text-emerald-700'}">${soldOut?'Sold out — backorder available':p.quantity+' in stock'}</span>
          </div>
          ${p.description ? `<div class="border-t pt-4"><p class="text-[11px] font-bold text-slate-400 uppercase tracking-wider mb-2">Description</p><div class="text-sm text-slate-600 leading-relaxed">${renderMarkup(p.description)}</div></div>` : '<p class="text-sm text-slate-400 italic">No description available.</p>'}
          ${p.sku ? `<p class="text-xs text-slate-400 mt-4">SKU: ${p.sku}</p>` : ''}
        </div>
      </div>
      <div class="border-t bg-white p-5 flex-shrink-0">
        <div class="flex items-center justify-between gap-3 mb-3">
          <span class="text-sm font-semibold text-slate-600">Quantity</span>
          <div class="flex items-center border border-slate-200 rounded-lg overflow-hidden">
            <button onclick="modalQtyStep(-1)" class="w-9 h-9 hover:bg-slate-100 font-bold text-slate-600 transition">−</button>
            <input id="modalQty" type="number" value="1" min="1" class="w-12 text-center text-sm font-semibold border-x border-slate-200 py-2 outline-none">
            <button onclick="modalQtyStep(1)" class="w-9 h-9 hover:bg-slate-100 font-bold text-slate-600 transition">+</button>
          </div>
        </div>
        <button onclick="addToCartQty('${p.__backendId}');closeProductModal();" class="w-full text-white hover:opacity-90 rounded-xl py-3 font-semibold transition flex items-center justify-center gap-2" style="background:linear-gradient(135deg,${soldOut?'#9a7b4f,#b8945f':'#b8945f,#d4af7a'});"><i data-lucide="${soldOut?'clock':'shopping-bag'}" class="w-4 h-4"></i>${soldOut?'Backorder this item':'Add to Order'}</button>
      </div>`;
    document.getElementById('productModal').classList.remove('hidden');
    document.body.style.overflow = 'hidden';
    lucide.createIcons();
  }
  function closeProductModal(){
    document.getElementById('productModal').classList.add('hidden');
    document.body.style.overflow = '';
  }
  function modalQtyStep(d){
    const inp = document.getElementById('modalQty'); if (!inp) return;
    inp.value = Math.max(1, (parseInt(inp.value)||1) + d);
  }
  function addToCartQty(id){
    const inp = document.getElementById('modalQty');
    let n = inp ? Math.max(1, parseInt(inp.value)||1) : 1;
    const p = products.find(x => x.__backendId === id); if (!p) return;
    const inStock = p.quantity || 0;
    const backorder = inStock <= 0;
    const existing = cart.find(c => c.productId === id);
    if (existing){
      let target = existing.qty + n;
      if (!backorder && target > inStock){ target = inStock; showToast('Limited to available stock','error'); }
      existing.qty = target;
    } else {
      if (!backorder && n > inStock){ n = inStock; showToast('Limited to available stock','error'); }
      cart.push({ productId:id, name:p.name, sku:p.sku||'', price:p.price||0, qty:n, max: backorder ? 0 : inStock, backorder });
    }
    updateCartCount(); saveCart(); showToast(backorder ? `Added ${n} as backorder` : `Added ${n} to your order`);
  }

  function setCategory(c){ activeCategory = c; renderCatalogue(); }

  function addToCart(id){
    const p = products.find(x => x.__backendId === id); if (!p) return;
    const inStock = p.quantity || 0;
    const backorder = inStock <= 0;
    const existing = cart.find(c => c.productId === id);
    if (existing){
      if (!backorder && existing.qty >= inStock){ showToast('No more stock available','error'); return; }
      existing.qty++;
    } else {
      cart.push({ productId:id, name:p.name, sku:p.sku||'', price:p.price||0, qty:1, max: backorder ? 0 : inStock, backorder });
    }
    updateCartCount(); saveCart(); showToast(backorder ? 'Added as backorder' : 'Added to your order');
  }
  function updateCartCount(){
    const count = cart.reduce((s,i)=>s+i.qty,0);
    const badge = document.getElementById('cartCount');
    if (count>0){ badge.textContent = count; badge.classList.remove('hidden'); } else badge.classList.add('hidden');
  }
  function openCart(){ document.getElementById('cartDrawer').classList.remove('hidden'); renderCart(); }
  function closeCart(){ document.getElementById('cartDrawer').classList.add('hidden'); }

  function renderCart(){
    const itemsArea = document.getElementById('cartItemsArea');
    const footer = document.getElementById('cartFooter');
    if (cart.length === 0){
      itemsArea.innerHTML = `<div class="text-center py-16">
        <div class="w-20 h-20 mx-auto mb-4 rounded-full flex items-center justify-center" style="background:#f3ede1;"><i data-lucide="shopping-bag" class="w-9 h-9" style="color:#b8945f;"></i></div>
        <h3 class="display text-lg font-bold text-slate-700">Your order is empty</h3>
        <p class="text-sm text-slate-400 mt-1 mb-5">Browse our products and add items to get started.</p>
        <button onclick="closeCart()" class="text-white rounded-full px-6 py-2.5 text-sm font-semibold transition hover:opacity-90" style="background:linear-gradient(135deg,#1a1a2e,#16213e);">Start Browsing</button>
      </div>`;
      footer.innerHTML = ''; lucide.createIcons(); return;
    }
    const total = cart.reduce((s,i)=>s+i.qty*i.price,0);
    itemsArea.innerHTML = cart.map((it,i)=>`
      <div class="flex items-center gap-3 py-3 border-b">
        <div class="flex-1 min-w-0"><p class="text-sm font-medium text-slate-800 truncate">${it.name}${it.backorder?' <span class="text-[10px] font-bold text-amber-700 bg-amber-100 px-1.5 py-0.5 rounded align-middle">BACKORDER</span>':''}</p><p class="text-xs text-slate-500">${formatCurrency(it.price)} each</p></div>
        <div class="flex items-center gap-2">
          <button onclick="changeQty(${i},-1)" class="w-7 h-7 rounded bg-slate-100 hover:bg-slate-200 font-bold text-slate-600">-</button>
          <span class="w-6 text-center text-sm font-semibold">${it.qty}</span>
          <button onclick="changeQty(${i},1)" class="w-7 h-7 rounded bg-slate-100 hover:bg-slate-200 font-bold text-slate-600">+</button>
        </div>
        <span class="w-20 text-right text-sm font-semibold text-slate-800">${formatCurrency(it.qty*it.price)}</span>
      </div>`).join('');
    footer.innerHTML = `
      <div class="flex justify-between mb-3"><span class="font-semibold text-slate-700">Total</span><span class="font-bold text-lg text-blue-600">${formatCurrency(total)}</span></div>
      <button onclick="showOrderForm()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg py-3 font-semibold transition">Submit Order Request</button>
      <div class="mt-3 space-y-1.5">
        <p class="flex items-center gap-2 text-xs text-slate-500"><i data-lucide="check-circle" class="w-3.5 h-3.5 text-emerald-500"></i>No payment now — we confirm by phone first</p>
        <p class="flex items-center gap-2 text-xs text-slate-500"><i data-lucide="shield-check" class="w-3.5 h-3.5 text-emerald-500"></i>Your details are kept private</p>
        <p class="flex items-center gap-2 text-xs text-slate-500"><i data-lucide="headphones" class="w-3.5 h-3.5 text-emerald-500"></i>Friendly support, real people</p>
      </div>`;
    lucide.createIcons();
  }
  function changeQty(i, d){
    const it = cart[i]; if (!it) return;
    it.qty += d;
    if (it.qty <= 0){ cart.splice(i,1); }
    else if (!it.backorder && it.max && it.qty > it.max){ it.qty = it.max; showToast('Reached available stock','error'); }
    updateCartCount(); saveCart(); renderCart();
  }

  function showOrderForm(){
    const itemsArea = document.getElementById('cartItemsArea');
    const footer = document.getElementById('cartFooter');
    itemsArea.innerHTML = `
      <h3 class="font-bold text-slate-800 mb-1">Your Details</h3>
      <p class="text-xs text-slate-500 mb-4">So we can confirm your order with you.</p>
      <div class="space-y-3">
        <div><label class="text-xs text-slate-600 font-semibold block mb-1">Name *</label><input id="ordName" class="w-full border rounded-lg px-3 py-2.5 text-sm" placeholder="Your full name"></div>
        <div><label class="text-xs text-slate-600 font-semibold block mb-1">Organization</label><input id="ordOrg" class="w-full border rounded-lg px-3 py-2.5 text-sm" placeholder="Company / school / dept"></div>
        <div><label class="text-xs text-slate-600 font-semibold block mb-1">Address</label><textarea id="ordAddr" rows="2" class="w-full border rounded-lg px-3 py-2.5 text-sm resize-none" placeholder="Delivery / billing address"></textarea></div>
        <div><label class="text-xs text-slate-600 font-semibold block mb-1">Job / Role</label><input id="ordRole" class="w-full border rounded-lg px-3 py-2.5 text-sm" placeholder="e.g., Purchasing Officer"></div>
        <div><label class="text-xs text-slate-600 font-semibold block mb-1">Phone *</label><input id="ordPhone" class="w-full border rounded-lg px-3 py-2.5 text-sm" placeholder="+60..."></div>
        <div><label class="text-xs text-slate-600 font-semibold block mb-1">Preferred Payment Method</label><select id="ordPayment" class="w-full border rounded-lg px-3 py-2.5 text-sm bg-white"><option value="cash">Cash</option><option value="lpo">LPO (Local Purchase Order)</option><option value="qr_banking">Online Banking</option></select></div>
        <div><label class="text-xs text-slate-600 font-semibold block mb-1">Notes</label><textarea id="ordNotes" rows="2" class="w-full border rounded-lg px-3 py-2.5 text-sm resize-none" placeholder="Anything else?"></textarea></div>
      </div>`;
    footer.innerHTML = `
      <button onclick="submitOrder(event)" id="submitOrderBtn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg py-3 font-semibold transition">Confirm &amp; Send</button>
      <button onclick="renderCart()" class="w-full text-slate-500 hover:text-slate-700 py-2 text-sm mt-1">Back to cart</button>`;
  }

  async function submitOrder(e){
    const name = document.getElementById('ordName').value.trim();
    const phone = document.getElementById('ordPhone').value.trim();
    if (!name || !phone){ showToast('Name and phone are required','error'); return; }
    const hasBackorder = cart.some(i => i.backorder);
    const orderRef = 'ORD-' + new Date().getFullYear() + '-' + Date.now().toString().slice(-6);
    const orderSnapshot = {
      ref: orderRef,
      name,
      organization: document.getElementById('ordOrg').value.trim(),
      address: document.getElementById('ordAddr').value.trim(),
      role: document.getElementById('ordRole').value.trim(),
      phone,
      payment: document.getElementById('ordPayment').value,
      notes: document.getElementById('ordNotes').value.trim(),
      items: cart.map(i => ({ name:i.name, sku:i.sku, qty:i.qty, price:i.price, backorder:i.backorder })),
      total: cart.reduce((s,i)=>s+i.qty*i.price,0),
      date: new Date().toISOString()
    };
    const order = {
      type:'customer_order',
      order_ref: orderRef,
      order_name: name,
      order_organization: orderSnapshot.organization,
      order_address: orderSnapshot.address,
      order_role: orderSnapshot.role,
      order_phone: phone,
      order_payment: orderSnapshot.payment,
      order_notes: (hasBackorder ? '[Includes BACKORDER items] ' : '') + orderSnapshot.notes,
      order_items: JSON.stringify(cart.map(i => [i.productId, i.qty, i.price, i.backorder ? 1 : 0])),
      order_total: orderSnapshot.total,
      order_status: 'new',
      created_at: orderSnapshot.date
    };
    const btn = document.getElementById('submitOrderBtn'); btn.disabled = true; btn.textContent = 'Sending…';
    try {
      const res = await fetch(SHEET_URL, { method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body: JSON.stringify({ action:'create', record: order }) });
      const json = await res.json();
      if (json.ok){
        cart = []; updateCartCount(); saveCart();
        window.lastQuotation = orderSnapshot;
        document.getElementById('cartItemsArea').innerHTML = `<div class="text-center py-10"><i data-lucide="check-circle" class="w-14 h-14 mx-auto mb-3 text-emerald-500"></i><h3 class="display text-xl font-bold text-slate-800">Order Sent!</h3><p class="text-sm text-slate-500 mt-1">Thank you, ${name}. We'll contact you shortly to confirm.</p><div class="mt-4 inline-block bg-slate-50 border rounded-lg px-4 py-2"><p class="text-xs text-slate-400">Your reference number</p><p class="font-mono font-bold text-slate-800">${orderRef}</p></div><p class="text-xs text-slate-400 mt-4">Save your quotation below for your records.</p></div>`;
        document.getElementById('cartFooter').innerHTML = `<button onclick="showQuotation()" class="w-full text-white rounded-lg py-3 font-semibold mb-2 flex items-center justify-center gap-2" style="background:linear-gradient(135deg,#b8945f,#d4af7a);"><i data-lucide="file-text" class="w-4 h-4"></i>View / Save Quotation</button><button onclick="closeCart();renderCatalogue()" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-lg py-2.5 font-semibold">Continue Browsing</button>`;
        lucide.createIcons();
      } else { btn.disabled=false; btn.textContent='Confirm & Send'; showToast('Could not send order','error'); }
    } catch(err){ btn.disabled=false; btn.textContent='Confirm & Send'; showToast('Network error, try again','error'); }
  }

  function showQuotation(){
    const q = window.lastQuotation; if (!q) return;
    const c = companyInfo || {};
    const payLabel = ({cash:'Cash', lpo:'LPO (Local Purchase Order)', qr_banking:'Online Banking'})[q.payment] || q.payment;
    const dateStr = new Date(q.date).toLocaleDateString('en-MY', { year:'numeric', month:'long', day:'numeric' });
    const rows = q.items.map((it,i)=>`<tr style="border-bottom:1px solid #e2e8f0;"><td style="padding:6px 8px;color:#475569;">${i+1}</td><td style="padding:6px 8px;font-family:monospace;font-size:11px;color:#475569;">${it.sku||'-'}</td><td style="padding:6px 8px;font-weight:500;color:#1e293b;">${it.name}${it.backorder?' <span style="color:#b45309;font-size:10px;font-weight:700;">(Backorder)</span>':''}</td><td style="padding:6px 8px;text-align:center;color:#334155;">${it.qty}</td><td style="padding:6px 8px;text-align:right;color:#334155;">${formatCurrency(it.price)}</td><td style="padding:6px 8px;text-align:right;font-weight:600;color:#1e293b;">${formatCurrency(it.qty*it.price)}</td></tr>`).join('');
    const docHtml = `
      <div id="quotationDoc" style="background:#fff;padding:32px;max-width:760px;margin:0 auto;font-family:'DM Sans',Arial,sans-serif;color:#1e293b;">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:24px;border-bottom:3px solid #b8945f;padding-bottom:18px;margin-bottom:20px;">
          <div style="flex:1;">
            ${c.company_logo ? `<img src="${c.company_logo}" style="width:48px;height:48px;object-fit:contain;margin-bottom:6px;" onerror="this.style.display='none'">` : ''}
            <h2 style="font-size:18px;font-weight:700;margin:0;">${c.company_name || 'Our Company'}</h2>
            <p style="font-size:10px;color:#64748b;margin:4px 0 0;white-space:pre-line;">${c.company_address || ''}</p>
            ${c.company_phone ? `<p style="font-size:10px;color:#64748b;margin:2px 0 0;">Tel: ${c.company_phone}</p>`:''}
            ${c.company_email ? `<p style="font-size:10px;color:#64748b;margin:2px 0 0;">${c.company_email}</p>`:''}
            ${c.company_reg ? `<p style="font-size:10px;color:#64748b;margin:2px 0 0;">Reg: ${c.company_reg}</p>`:''}
          </div>
          <div style="text-align:right;">
            <h1 style="font-size:32px;font-weight:700;color:#b45309;margin:0 0 6px;">QUOTATION</h1>
            <p style="font-size:12px;font-family:monospace;color:#475569;margin:0;">${q.ref}</p>
            <p style="font-size:12px;color:#64748b;margin:2px 0 0;">Date: ${dateStr}</p>
          </div>
        </div>
        <div style="margin-bottom:18px;">
          <p style="font-size:10px;text-transform:uppercase;letter-spacing:0.05em;color:#94a3b8;font-weight:600;margin:0 0 6px;">Prepared For</p>
          <div style="border-left:4px solid #d4af7a;padding-left:12px;">
            <p style="font-weight:600;margin:0;">${q.name}</p>
            ${q.organization?`<p style="font-size:12px;color:#475569;margin:2px 0 0;">${q.organization}</p>`:''}
            ${q.role?`<p style="font-size:12px;color:#64748b;margin:2px 0 0;">${q.role}</p>`:''}
            ${q.address?`<p style="font-size:12px;color:#64748b;margin:2px 0 0;">${q.address}</p>`:''}
            <p style="font-size:12px;color:#64748b;margin:2px 0 0;">${q.phone}</p>
          </div>
        </div>
        <div style="background:#fef3c7;border:1px solid #fcd34d;border-radius:6px;padding:8px 12px;margin-bottom:16px;">
          <p style="font-size:11px;color:#475569;margin:0;"><strong>Preferred Payment:</strong> ${payLabel}</p>
        </div>
        <table style="width:100%;border-collapse:collapse;font-size:12px;margin-bottom:18px;">
          <thead><tr style="background:#fef3c7;border-bottom:2px solid #fcd34d;"><th style="text-align:left;padding:8px;">#</th><th style="text-align:left;padding:8px;">SKU</th><th style="text-align:left;padding:8px;">Description</th><th style="text-align:center;padding:8px;">Qty</th><th style="text-align:right;padding:8px;">Unit Price</th><th style="text-align:right;padding:8px;">Amount</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
        <div style="display:flex;justify-content:flex-end;margin-bottom:20px;">
          <div style="width:240px;background:#f8fafc;padding:12px;border-radius:6px;border:1px solid #cbd5e1;">
            <div style="display:flex;justify-content:space-between;font-size:14px;font-weight:700;"><span>Total</span><span style="color:#b45309;">${formatCurrency(q.total)}</span></div>
          </div>
        </div>
        <div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;padding:10px;margin-bottom:16px;">
          <p style="font-size:10px;font-weight:600;color:#475569;margin:0 0 4px;">Terms</p>
          <p style="font-size:10px;color:#64748b;margin:0;line-height:1.4;">This is a quotation based on your order request. Prices are subject to confirmation. We will contact you to finalize availability, payment, and delivery. No payment has been made.</p>
        </div>
        <p style="text-align:center;font-size:10px;color:#94a3b8;margin:0;">Thank you for your order! &middot; ${c.company_name || ''}</p>
      </div>`;
    const overlay = document.createElement('div');
    overlay.id = 'quotationOverlay';
    overlay.className = 'fixed inset-0 z-[160] flex flex-col p-4';
    overlay.style.background = 'rgba(20,20,35,0.7)';
    overlay.innerHTML = `
      <div class="max-w-3xl w-full mx-auto bg-white rounded-xl shadow-2xl flex flex-col" style="max-height:92vh;">
        <div class="flex items-center justify-between p-4 border-b flex-shrink-0">
          <h3 class="font-bold text-slate-800">Your Quotation</h3>
          <div class="flex gap-2">
            <button onclick="downloadQuotationPDF()" class="bg-rose-600 hover:bg-rose-700 text-white px-4 py-2 rounded-lg text-sm font-semibold flex items-center gap-2"><i data-lucide="download" class="w-4 h-4"></i>Save PDF</button>
            <button onclick="closeQuotation()" class="bg-slate-100 hover:bg-slate-200 text-slate-700 w-9 h-9 rounded-lg flex items-center justify-center"><i data-lucide="x" class="w-5 h-5"></i></button>
          </div>
        </div>
        <div class="overflow-y-auto p-4 bg-slate-100">${docHtml}</div>
      </div>`;
    document.body.appendChild(overlay);
    document.body.style.overflow = 'hidden';
    lucide.createIcons();
  }
  function closeQuotation(){ const o = document.getElementById('quotationOverlay'); if (o) o.remove(); document.body.style.overflow=''; }
  function downloadQuotationPDF(){
    const el = document.getElementById('quotationDoc'); if (!el) return;
    const w = window.open('', 'PDF', 'height=900,width=800');
    if (!w){ showToast('Please allow pop-ups to save PDF','error'); return; }
    w.document.write('<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Quotation ' + (window.lastQuotation?.ref||'') + '</title><style>@page{size:A4;margin:10mm;}body{margin:0;font-family:Arial,sans-serif;}table{width:100%;border-collapse:collapse;}</style></head><body>' + el.outerHTML + '</body></html>');
    w.document.close(); w.focus();
    setTimeout(()=>{ w.print(); }, 600);
  }

  /* ===== BOOT ===== */
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape'){ closeProductModal(); closeCart(); } });
  (async () => {
    updateCartCount();
    document.getElementById('catalogueArea').innerHTML = '<div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">' + Array(10).fill(0).map(()=>'<div class="bg-white rounded-2xl overflow-hidden" style="box-shadow:0 4px 20px -8px rgba(0,0,0,0.1);"><div class="skeleton h-40"></div><div class="p-4"><div class="skeleton h-3 w-1/3 rounded mb-2"></div><div class="skeleton h-4 w-3/4 rounded mb-3"></div><div class="skeleton h-5 w-1/2 rounded mb-3"></div><div class="skeleton h-8 w-full rounded-lg"></div></div></div>').join('') + '</div>';
    const ok = await loadData();
    if (!ok){ document.getElementById('catalogueArea').innerHTML = '<div class="text-center py-20 text-slate-400"><p class="font-semibold text-slate-600 mb-1">Unable to load products right now.</p><p class="text-sm">Please check your connection and refresh the page.</p></div>'; }
    lucide.createIcons();
  })();
  </script>
 </body>
</html>
