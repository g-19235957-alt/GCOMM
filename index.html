<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Catalogue</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <script>tailwind.config = { theme: { extend: { fontFamily: { sans: ['DM Sans','sans-serif'], display: ['Playfair Display','serif'] } } } }</script>
  <style>
    html, body { margin:0; }
    body { font-family:'DM Sans',sans-serif; }
    .toast-enter { animation: slideIn 0.3s ease; }
    @keyframes slideIn { from { transform: translateY(-100%); opacity:0; } to { transform: translateY(0); opacity:1; } }
    .line-clamp-2 { display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  </style>
 </head>
 <body class="bg-slate-50 min-h-full">

  <!-- SETUP (first run only, stored on device) -->
  <div id="setupScreen" class="hidden fixed inset-0 z-[200] bg-slate-900 text-white overflow-y-auto">
    <div class="max-w-lg mx-auto px-6 py-12">
      <h1 class="font-display text-2xl font-bold mb-2">Connect Catalogue</h1>
      <p class="text-slate-300 text-sm mb-6">Paste the same Google Apps Script Web App URL you use for CloudPOS. It links this catalogue to your live products and sends orders back to your system. Stored on this device only.</p>
      <input id="setupUrlInput" type="url" placeholder="https://script.google.com/macros/s/..../exec" class="w-full rounded-lg px-4 py-3 text-slate-900 text-sm mb-3">
      <div id="setupError" class="hidden text-red-300 text-sm mb-3"></div>
      <button onclick="connectCatalogue()" id="connectBtn" class="w-full bg-blue-600 hover:bg-blue-700 rounded-lg py-3 font-semibold transition">Connect</button>
    </div>
  </div>

  <!-- HEADER -->
  <header class="bg-gradient-to-r from-slate-900 to-slate-800 text-white">
    <div class="max-w-6xl mx-auto px-4 py-6 flex items-center justify-between gap-4">
      <div class="flex items-center gap-3 min-w-0">
        <img id="catLogo" class="hidden h-10 w-10 object-contain rounded bg-white p-1" alt="">
        <div class="min-w-0">
          <h1 id="catTitle" class="font-display text-2xl font-bold truncate">Product Catalogue</h1>
          <p class="text-slate-300 text-xs">Browse and request an order</p>
        </div>
      </div>
      <button onclick="openCart()" class="relative bg-blue-600 hover:bg-blue-700 rounded-lg px-4 py-2.5 font-semibold flex items-center gap-2 flex-shrink-0">
        <i data-lucide="shopping-cart" class="w-4 h-4"></i><span class="hidden sm:inline">Cart</span>
        <span id="cartCount" class="hidden absolute -top-2 -right-2 bg-red-600 text-white text-xs font-bold rounded-full w-5 h-5 flex items-center justify-center">0</span>
      </button>
    </div>
  </header>

  <!-- MAIN -->
  <main class="max-w-6xl mx-auto px-4 py-8">
    <div id="catalogueArea"><div class="text-center py-20 text-slate-400">Loading products…</div></div>
  </main>

  <!-- CART DRAWER -->
  <div id="cartDrawer" class="hidden fixed inset-0 z-[120]">
    <div class="absolute inset-0 bg-black/50" onclick="closeCart()"></div>
    <div class="absolute right-0 top-0 bottom-0 w-full max-w-md bg-white flex flex-col shadow-xl">
      <div class="p-5 border-b flex items-center justify-between">
        <h2 class="font-bold text-lg text-slate-800">Your Order</h2>
        <button onclick="closeCart()" class="text-slate-400 hover:text-slate-600"><i data-lucide="x" class="w-5 h-5"></i></button>
      </div>
      <div id="cartItemsArea" class="flex-1 overflow-y-auto p-5"></div>
      <div id="cartFooter" class="border-t p-5"></div>
    </div>
  </div>

  <div id="toastContainer" class="fixed top-4 right-4 z-[300] flex flex-col gap-2"></div>

  <script>
  const SHEETS_URL_KEY = 'catalogue_sheets_url';
  let SHEET_URL = localStorage.getItem(SHEETS_URL_KEY) || '';
  let products = [], companyInfo = null, cart = [], activeCategory = 'all';

  function showToast(msg, type='success'){
    const t = document.createElement('div');
    t.className = `toast-enter px-4 py-3 rounded-lg shadow-lg text-sm font-medium ${type==='error'?'bg-red-600 text-white':'bg-emerald-600 text-white'}`;
    t.textContent = msg; document.getElementById('toastContainer').appendChild(t);
    setTimeout(()=>t.remove(), 3000);
  }
  function formatCurrency(n){ return new Intl.NumberFormat('ms-MY',{style:'currency',currency:'MYR'}).format(n||0); }

  async function loadData(){
    try {
      const res = await fetch(SHEET_URL, { method:'GET' });
      const json = await res.json();
      if (!json.ok) throw new Error('bad response');
      const data = json.data || [];
      products = data.filter(d => d.type === 'product');
      companyInfo = data.find(d => d.type === 'company') || null;
      applyBranding();
      renderCatalogue();
      return true;
    } catch(e){ console.error(e); return false; }
  }

  function applyBranding(){
    const name = companyInfo?.company_name || 'Product Catalogue';
    document.getElementById('catTitle').textContent = name;
    document.title = name;
    const logo = companyInfo?.company_logo;
    const img = document.getElementById('catLogo');
    if (logo){ img.src = logo; img.classList.remove('hidden'); img.onerror = ()=>img.classList.add('hidden'); }
  }

  function renderCatalogue(){
    const area = document.getElementById('catalogueArea');
    if (products.length === 0){ area.innerHTML = '<div class="text-center py-20 text-slate-400">No products available right now.</div>'; return; }
    const categories = [...new Set(products.map(p => p.category || 'Uncategorized'))];
    const visible = activeCategory === 'all' ? products : products.filter(p => (p.category||'Uncategorized') === activeCategory);
    area.innerHTML = `
      <div class="mb-6 flex flex-wrap gap-2">
        <button onclick="setCategory('all')" class="px-4 py-2 rounded-full font-semibold text-sm transition ${activeCategory==='all'?'bg-blue-600 text-white':'bg-white border text-slate-700 hover:bg-slate-100'}">All</button>
        ${categories.map(c => `<button onclick="setCategory('${c.replace(/'/g,"\\'")}')" class="px-4 py-2 rounded-full font-semibold text-sm transition ${activeCategory===c?'bg-blue-600 text-white':'bg-white border text-slate-700 hover:bg-slate-100'}">${c}</button>`).join('')}
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
        ${visible.map(renderProductCard).join('')}
      </div>`;
    lucide.createIcons();
  }

  function renderProductCard(p){
    const soldOut = (p.quantity || 0) <= 0;
    return `<div class="bg-white rounded-xl shadow-sm hover:shadow-lg transition overflow-hidden flex flex-col">
      <div class="relative h-44 bg-gradient-to-br from-slate-100 to-slate-200 flex items-center justify-center overflow-hidden">
        ${p.product_photo ? `<img src="${p.product_photo}" alt="${p.name}" class="w-full h-full object-cover" onerror="this.style.display='none'">` : `<i data-lucide="package" class="w-14 h-14 text-slate-300"></i>`}
        ${soldOut ? `<div class="absolute inset-0 bg-black/50 flex items-center justify-center"><span class="bg-red-600 text-white px-4 py-1.5 rounded-lg font-semibold text-sm">Sold out</span></div>` : ''}
      </div>
      <div class="p-4 flex-1 flex flex-col">
        ${p.category ? `<span class="text-[11px] font-semibold text-blue-600 uppercase tracking-wider mb-1">${p.category}</span>` : ''}
        <h3 class="font-bold text-slate-900">${p.name}</h3>
        ${p.description ? `<p class="text-xs text-slate-500 mt-1 line-clamp-2">${p.description}</p>` : ''}
        <div class="mt-auto pt-3">
          <div class="flex items-center justify-between mb-2">
            <span class="text-lg font-bold text-blue-600">${formatCurrency(p.price)}</span>
            <span class="text-xs ${soldOut?'text-red-500 font-semibold':'text-slate-500'}">${soldOut?'0 in stock':p.quantity+' in stock'}</span>
          </div>
          <button ${soldOut?'disabled':''} onclick="addToCart('${p.__backendId}')" class="w-full ${soldOut?'bg-slate-200 text-slate-400 cursor-not-allowed':'bg-blue-600 hover:bg-blue-700 text-white'} rounded-lg py-2 text-sm font-semibold transition flex items-center justify-center gap-2"><i data-lucide="plus" class="w-4 h-4"></i>${soldOut?'Unavailable':'Add to Order'}</button>
        </div>
      </div>
    </div>`;
  }

  function setCategory(c){ activeCategory = c; renderCatalogue(); }

  function addToCart(id){
    const p = products.find(x => x.__backendId === id); if (!p) return;
    const existing = cart.find(c => c.productId === id);
    const inStock = p.quantity || 0;
    if (existing){ if (existing.qty >= inStock){ showToast('No more stock available','error'); return; } existing.qty++; }
    else cart.push({ productId:id, name:p.name, sku:p.sku||'', price:p.price||0, qty:1, max:inStock });
    updateCartCount(); showToast('Added to your order');
  }
  function updateCartCount(){
    const count = cart.reduce((s,i)=>s+i.qty,0);
    const badge = document.getElementById('cartCount');
    if (count>0){ badge.textContent = count; badge.classList.remove('hidden'); } else badge.classList.add('hidden');
  }
  function openCart(){ document.getElementById('cartDrawer').classList.remove('hidden'); renderCart(); }
  function closeCart(){ document.getElementById('cartDrawer').classList.add('hidden'); }

  function renderCart(){
    const itemsArea = document.getElementById('cartItemsArea');
    const footer = document.getElementById('cartFooter');
    if (cart.length === 0){
      itemsArea.innerHTML = '<div class="text-center py-16 text-slate-400"><i data-lucide="shopping-cart" class="w-10 h-10 mx-auto mb-2"></i><p>Your order is empty</p></div>';
      footer.innerHTML = ''; lucide.createIcons(); return;
    }
    const total = cart.reduce((s,i)=>s+i.qty*i.price,0);
    itemsArea.innerHTML = cart.map((it,i)=>`
      <div class="flex items-center gap-3 py-3 border-b">
        <div class="flex-1 min-w-0"><p class="text-sm font-medium text-slate-800 truncate">${it.name}</p><p class="text-xs text-slate-500">${formatCurrency(it.price)} each</p></div>
        <div class="flex items-center gap-2">
          <button onclick="changeQty(${i},-1)" class="w-7 h-7 rounded bg-slate-100 hover:bg-slate-200 font-bold text-slate-600">-</button>
          <span class="w-6 text-center text-sm font-semibold">${it.qty}</span>
          <button onclick="changeQty(${i},1)" class="w-7 h-7 rounded bg-slate-100 hover:bg-slate-200 font-bold text-slate-600">+</button>
        </div>
        <span class="w-20 text-right text-sm font-semibold text-slate-800">${formatCurrency(it.qty*it.price)}</span>
      </div>`).join('');
    footer.innerHTML = `
      <div class="flex justify-between mb-3"><span class="font-semibold text-slate-700">Total</span><span class="font-bold text-lg text-blue-600">${formatCurrency(total)}</span></div>
      <button onclick="showOrderForm()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg py-3 font-semibold transition">Submit Order Request</button>
      <p class="text-xs text-slate-400 text-center mt-2">No payment now. We'll contact you to confirm.</p>`;
    lucide.createIcons();
  }
  function changeQty(i, d){
    const it = cart[i]; if (!it) return;
    it.qty += d;
    if (it.qty <= 0){ cart.splice(i,1); }
    else if (it.max && it.qty > it.max){ it.qty = it.max; showToast('Reached available stock','error'); }
    updateCartCount(); renderCart();
  }

  function showOrderForm(){
    const itemsArea = document.getElementById('cartItemsArea');
    const footer = document.getElementById('cartFooter');
    itemsArea.innerHTML = `
      <h3 class="font-bold text-slate-800 mb-1">Your Details</h3>
      <p class="text-xs text-slate-500 mb-4">So we can confirm your order with you.</p>
      <div class="space-y-3">
        <div><label class="text-xs text-slate-600 font-semibold block mb-1">Name *</label><input id="ordName" class="w-full border rounded-lg px-3 py-2.5 text-sm" placeholder="Your full name"></div>
        <div><label class="text-xs text-slate-600 font-semibold block mb-1">Organization</label><input id="ordOrg" class="w-full border rounded-lg px-3 py-2.5 text-sm" placeholder="Company / school / dept"></div>
        <div><label class="text-xs text-slate-600 font-semibold block mb-1">Address</label><textarea id="ordAddr" rows="2" class="w-full border rounded-lg px-3 py-2.5 text-sm resize-none" placeholder="Delivery / billing address"></textarea></div>
        <div><label class="text-xs text-slate-600 font-semibold block mb-1">Job / Role</label><input id="ordRole" class="w-full border rounded-lg px-3 py-2.5 text-sm" placeholder="e.g., Purchasing Officer"></div>
        <div><label class="text-xs text-slate-600 font-semibold block mb-1">Phone *</label><input id="ordPhone" class="w-full border rounded-lg px-3 py-2.5 text-sm" placeholder="+60..."></div>
        <div><label class="text-xs text-slate-600 font-semibold block mb-1">Notes</label><textarea id="ordNotes" rows="2" class="w-full border rounded-lg px-3 py-2.5 text-sm resize-none" placeholder="Anything else?"></textarea></div>
      </div>`;
    footer.innerHTML = `
      <button onclick="submitOrder(event)" id="submitOrderBtn" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg py-3 font-semibold transition">Confirm &amp; Send</button>
      <button onclick="renderCart()" class="w-full text-slate-500 hover:text-slate-700 py-2 text-sm mt-1">Back to cart</button>`;
  }

  async function submitOrder(e){
    const name = document.getElementById('ordName').value.trim();
    const phone = document.getElementById('ordPhone').value.trim();
    if (!name || !phone){ showToast('Name and phone are required','error'); return; }
    const order = {
      type:'customer_order',
      order_name: name,
      order_organization: document.getElementById('ordOrg').value.trim(),
      order_address: document.getElementById('ordAddr').value.trim(),
      order_role: document.getElementById('ordRole').value.trim(),
      order_phone: phone,
      order_notes: document.getElementById('ordNotes').value.trim(),
      order_items: JSON.stringify(cart.map(i => [i.productId, i.qty, i.price])),
      order_total: cart.reduce((s,i)=>s+i.qty*i.price,0),
      order_status: 'new',
      created_at: new Date().toISOString()
    };
    const btn = document.getElementById('submitOrderBtn'); btn.disabled = true; btn.textContent = 'Sending…';
    try {
      const res = await fetch(SHEET_URL, { method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'}, body: JSON.stringify({ action:'create', record: order }) });
      const json = await res.json();
      if (json.ok){
        cart = []; updateCartCount();
        document.getElementById('cartItemsArea').innerHTML = '<div class="text-center py-16"><i data-lucide="check-circle" class="w-12 h-12 mx-auto mb-3 text-emerald-500"></i><h3 class="font-bold text-slate-800">Order sent!</h3><p class="text-sm text-slate-500 mt-1">Thank you. We\'ll contact you shortly to confirm.</p></div>';
        document.getElementById('cartFooter').innerHTML = '<button onclick="closeCart();renderCatalogue()" class="w-full bg-blue-600 hover:bg-blue-700 text-white rounded-lg py-3 font-semibold">Continue Browsing</button>';
        lucide.createIcons();
      } else { btn.disabled=false; btn.textContent='Confirm & Send'; showToast('Could not send order','error'); }
    } catch(err){ btn.disabled=false; btn.textContent='Confirm & Send'; showToast('Network error, try again','error'); }
  }

  /* ===== SETUP ===== */
  function showSetup(){ document.getElementById('setupScreen').classList.remove('hidden'); }
  async function connectCatalogue(){
    const url = document.getElementById('setupUrlInput').value.trim();
    const err = document.getElementById('setupError');
    const btn = document.getElementById('connectBtn');
    if (!/^https:\/\/script\.google\.com\/macros\/s\/.+\/exec$/.test(url)){ err.textContent='That does not look like a valid Web App URL (must end in /exec).'; err.classList.remove('hidden'); return; }
    btn.disabled=true; btn.textContent='Connecting…';
    SHEET_URL = url; localStorage.setItem(SHEETS_URL_KEY, url);
    const ok = await loadData();
    btn.disabled=false; btn.textContent='Connect';
    if (ok){ document.getElementById('setupScreen').classList.add('hidden'); }
    else { err.textContent='Could not reach the data. Check the URL and that access is set to "Anyone".'; err.classList.remove('hidden'); }
  }

  /* ===== BOOT ===== */
  (async () => {
    if (!SHEET_URL){ showSetup(); }
    else { const ok = await loadData(); if (!ok) showSetup(); }
    lucide.createIcons();
  })();
  </script>
 </body>
</html>
